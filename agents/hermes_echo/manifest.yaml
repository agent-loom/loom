api_version: agent.platform/v1
kind: AgentPackage

metadata:
  id: hermes_echo
  name: Hermes Echo Agent
  description: Echo agent using HermesRuntimeBackend with real model gateway
  owner: platform-team
  domain: demo
  tags:
    - demo
    - hermes
    - spike

version:
  package_version: 0.1.0
  runtime_compat: ">=0.1.0 <0.2.0"
  release_channel: dev

runtime:
  backend: hermes
  max_iterations: 3
  timeout_ms: 15000

models:
  default:
    provider: openai
    model: z-ai/glm-5
    temperature: 0.0
    max_tokens: 512
    api_key_ref: ANTHROPIC_API_KEY
    base_url_ref: HERMES_OPENAI_BASE_URL

prompts:
  orchestrator: prompts/orchestrator.md

tools:
  allow: []
  deny:
    - terminal
    - code_execution
  timeout_ms: 3000
  max_parallel: 1

knowledge:
  sources: []

routing:
  strategy: single
  fallback_worker: direct_reply

session:
  scope: session
  history_window: 5
  memory_enabled: false

context:
  required: []
  optional: []

output:
  protocol: agent-chat/v1
  supports:
    - text
  command_allowlist: []

safety: {}

evals:
  suites:
    - evals/golden.yaml
  required_pass_rate: 1.0

extensions:
  hermes:
    require_sdk: true
    fallback_on_error: false
