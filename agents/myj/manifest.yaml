api_version: agent.platform/v1
kind: AgentPackage

metadata:
  id: myj
  name: 美宜佳数字店员
  description: 面向门店屏、收银机、小程序的便利店业务助手
  owner: retail-ai
  domain: retail
  tags:
    - store-assistant
    - product-search
    - location

version:
  package_version: 0.1.0
  runtime_compat: ">=0.1.0 <0.2.0"
  release_channel: dev

entry:
  mode: orchestrator_workers
  orchestrator: main
  default_worker: direct_reply

runtime:
  backend: native
  entrypoint: agents.myj.adapter:MyjAdapter
  max_iterations: 4
  timeout_ms: 5000

models:
  default:
    provider: demo
    model: native-demo
    temperature: 0.2
    max_tokens: 1024

prompts:
  orchestrator: prompts/orchestrator.md
  direct_reply: prompts/direct_reply.md
  reply_style: prompts/reply_style.md

tools:
  allow:
    - myj.goods_search
    - myj.goods_location
    - myj.promotion_lookup
    - myj.store_consult
  deny:
    - terminal
    - code_execution
  timeout_ms: 3000
  max_parallel: 2

knowledge:
  sources: []

routing:
  strategy: hybrid
  rules: policies/routing.yaml
  fallback_worker: direct_reply
  human_handoff_intents:
    - 转人工

session:
  scope: tenant_store_user
  history_window: 20
  memory_enabled: false
  compression:
    enabled: true
    threshold_tokens: 12000

context:
  required:
    - context.tenant.retailer_id
  optional:
    - context.store.store_id
    - context.channel.channel_id
    - context.device.device_id

output:
  protocol: agent-chat/v1
  supports:
    - text
    - cards
    - commands
    - debug
  command_allowlist:
    - product.recommend
    - product.locate
    - cart.add
    - human.handoff

safety:
  policy: policies/safety.yaml
  moderation:
    input: true
    output: true

evals:
  suites:
    - evals/golden.yaml
    - evals/intent_cases.yaml
  required_pass_rate: 0.9

extensions:
  hermes:
    enabled_toolsets:
      - safe
    disabled_toolsets:
      - terminal
      - code_execution
    max_iterations: 8
    memory_provider: session
