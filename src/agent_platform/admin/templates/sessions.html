{% extends "base.html" %}
{% block title %}会话管理{% endblock %}
{% block page_title %}会话管理{% endblock %}
{% block nav_sessions %}bg-gray-800 text-white{% endblock %}

{% block content %}
<div x-data="sessionsData()" x-init="init()">
  <div class="bg-white rounded-xl shadow">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h3 class="text-lg font-semibold">会话列表</h3>
      <div class="flex items-center space-x-4">
        <select x-model="filterAgent" @change="loadSessions()" class="border rounded px-3 py-1 text-sm">
          <option value="">全部 Agent</option>
          <template x-for="a in agents" :key="a.agent_id">
            <option :value="a.agent_id" x-text="a.agent_id"></option>
          </template>
        </select>
        <button @click="loadSessions()" class="text-sm text-blue-600 hover:underline">刷新</button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">会话 ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Agent</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">租户</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">消息数</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <template x-for="s in sessions" :key="s.session_id">
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 text-sm font-mono" x-text="s.session_id?.substring(0,12) + '...'"></td>
              <td class="px-6 py-4 text-sm" x-text="s.agent_id || '-'"></td>
              <td class="px-6 py-4 text-sm" x-text="s.tenant_id || '-'"></td>
              <td class="px-6 py-4 text-sm" x-text="s.messages?.length ?? s.message_count ?? '-'"></td>
              <td class="px-6 py-4">
                <button @click="viewSession(s.session_id)" class="text-sm text-blue-600 hover:underline mr-3">详情</button>
                <button @click="deleteSession(s.session_id)" class="text-sm text-red-600 hover:underline">删除</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <p x-show="sessions.length === 0" class="px-6 py-8 text-center text-gray-400">暂无会话</p>
    </div>
  </div>

  <!-- 会话详情 -->
  <div x-show="detail" x-cloak class="mt-6 bg-white rounded-xl shadow p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold">会话详情</h3>
      <button @click="detail = null" class="text-gray-400 hover:text-gray-600">关闭</button>
    </div>
    <div class="space-y-3 max-h-96 overflow-y-auto">
      <template x-for="(msg, i) in detail?.messages || []" :key="i">
        <div class="p-3 rounded-lg" :class="msg.role === 'user' ? 'bg-blue-50' : 'bg-gray-50'">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold" :class="msg.role === 'user' ? 'text-blue-600' : 'text-gray-600'" x-text="msg.role"></span>
          </div>
          <p class="text-sm" x-text="msg.content"></p>
        </div>
      </template>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sessionsData() {
  return {
    agents: [],
    sessions: [],
    filterAgent: '',
    detail: null,
    async init() {
      try { this.agents = await apiFetch('/api/v1/agents'); } catch {}
      await this.loadSessions();
    },
    async loadSessions() {
      try {
        let url = '/api/v1/sessions';
        if (this.filterAgent) url += '?agent_id=' + this.filterAgent;
        this.sessions = await apiFetch(url);
      } catch (e) {
        console.error('加载会话失败:', e);
        this.sessions = [];
      }
    },
    async viewSession(sessionId) {
      try {
        this.detail = await apiFetch('/api/v1/sessions/' + sessionId);
      } catch (e) {
        console.error('加载会话详情失败:', e);
      }
    },
    async deleteSession(sessionId) {
      if (!confirm('确定要删除会话 ' + sessionId + '?')) return;
      try {
        await fetch('/api/v1/sessions/' + sessionId, {method: 'DELETE', headers: apiHeaders()});
        await this.loadSessions();
      } catch (e) {
        console.error('删除失败:', e);
      }
    }
  };
}
</script>
{% endblock %}
